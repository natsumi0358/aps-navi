<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}APSナビ｜N.K.ナーツ{% endblock %}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      background: #f5f5f5;
      color: #333;
      min-height: 100vh;
    }

    header {
      background: #1a1a2e;
      color: white;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    header .header-left a {
      text-decoration: none;
      color: white;
    }

    header h1 {
      font-size: 16px;
      font-weight: 700;
      line-height: 1.3;
    }

    header p {
      font-size: 11px;
      color: #aaa;
      margin-top: 2px;
    }

    .btn {
      display: inline-block;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      border: none;
      text-decoration: none;
      white-space: nowrap;
    }

    .btn-primary {
      background: #e94560;
      color: white;
    }

    .btn-primary:hover { background: #c73652; }

    .btn-secondary {
      background: none;
      border: 1px solid #555;
      color: #aaa;
    }

    .btn-secondary:hover { border-color: #999; color: #fff; }

    .btn-danger {
      background: none;
      border: 1px solid #c73652;
      color: #e94560;
      font-size: 13px;
      padding: 6px 12px;
    }

    .btn-danger:hover { background: #c73652; color: white; }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px 16px;
    }

    @media (max-width: 600px) {
      .container { padding: 16px 12px; }
    }
  </style>
  {% block extra_style %}{% endblock %}
</head>
<body>

<header>
  <div class="header-left">
    <a href="/">
      <h1>APSナビ</h1>
      <p>ゴールから逆算提案しお客様に価値を届ける。</p>
    </a>
  </div>
  <div class="header-right">
    {% block header_action %}{% endblock %}
  </div>
</header>

{% block content %}{% endblock %}

</body>
</html>
